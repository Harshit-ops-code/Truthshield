<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #090b16;
      color: #f4f7fa;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      border-b: 1px solid rgba(16, 185, 129, 0.2);
      padding-bottom: 12px;
      margin-bottom: 12px;
    }
    .logo {
      background: #10b981;
      color: white;
      font-weight: bold;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #f4f7fa;
    }
    .badge {
      font-size: 9px;
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #10b981;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: bold;
    }
    .status-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .label {
      font-size: 8px;
      font-weight: bold;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 4px;
    }
    .selection-text {
      font-size: 11px;
      font-style: italic;
      color: #94a3b8;
      line-height: 1.4;
    }
    .verdict-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      padding-bottom: 8px;
      margin-bottom: 8px;
    }
    .verdict {
      font-weight: bold;
      font-size: 13px;
    }
    .score {
      font-weight: bold;
      font-size: 14px;
    }
    .explanation {
      font-size: 11px;
      line-height: 1.4;
      color: #cbd5e1;
    }
    .loading-spinner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 24px 0;
      font-size: 11px;
      color: #10b981;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(16, 185, 129, 0.1);
      border-top-color: #10b981;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .empty-state {
      text-align: center;
      padding: 24px 0;
      font-size: 11px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">T</div>
    <div class="title" style="flex: 1;">TruthShield</div>
    <div class="badge">V3</div>
  </div>

  <div id="content">
    <div class="empty-state">
      Highlight a statement on the page, right-click, and select "Check with TruthShield" to see live metrics here.
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
